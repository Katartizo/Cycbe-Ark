<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>CYCBE ARK - Coming Soon</title>
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <meta content="Cycbe Ark Launching Soon" name="keywords">
        <meta content="Cycbe Ark is launching soon. Get ready for the future of digital innovation." name="description">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Saira:wght@500;600;700&display=swap" rel="stylesheet"> 

        <link href="css/bootstrap.min.css" rel="stylesheet">
        
        <link href="lib/animate/animate.min.css" rel="stylesheet">

        <style>
            .coming-soon-bg {
                background: linear-gradient(rgba(9, 30, 62, 0.85), rgba(9, 30, 62, 0.85)), url('img/carousel-5.jpg') center center no-repeat;
                background-size: cover;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            .countdown-box {
                min-width: 130px;
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
        </style>
    </head>

    <body class="coming-soon-bg text-center">

        <div class="container wow fadeIn" data-wow-delay="0.1s">
            <img src="img/IMG-20260427-WA0039.jpg" alt="Cycbe Ark Logo" class="rounded-circle mb-4 shadow-lg border border-3 border-primary" style="width: 150px; height: 150px; object-fit: cover;">
            
            <h1 class="display-1 text-white fw-bold mb-3">Launching Soon</h1>
            <p class="fs-4 text-white-50 mb-5">Get ready for the future of digital innovation and leadership.</p>

            <div id="countdown" class="d-flex justify-content-center flex-wrap gap-3 mt-4">
                <div class="countdown-box p-4 rounded text-center shadow">
                    <h1 id="days" class="display-3 text-primary mb-0 fw-bold">00</h1>
                    <span class="text-white fs-5 text-uppercase tracking-wider">Days</span>
                </div>

                <div class="countdown-box p-4 rounded text-center shadow">
                    <h1 id="hours" class="display-3 text-primary mb-0 fw-bold">00</h1>
                    <span class="text-white fs-5 text-uppercase tracking-wider">Hours</span>
                </div>

                <div class="countdown-box p-4 rounded text-center shadow">
                    <h1 id="minutes" class="display-3 text-primary mb-0 fw-bold">00</h1>
                    <span class="text-white fs-5 text-uppercase tracking-wider">Minutes</span>
                </div>

                <div class="countdown-box p-4 rounded text-center shadow">
                    <h1 id="seconds" class="display-3 text-primary mb-0 fw-bold">00</h1>
                    <span class="text-white fs-5 text-uppercase tracking-wider">Seconds</span>
                </div>
            </div>

            <div id="launch-message" class="d-none mt-5">
                <h1 class="text-primary display-2 fw-bold animated tada infinite">WE ARE LIVE!</h1>
                <p class="fs-4 text-white">Welcome to Cycbe Ark.</p>
                <a href="index.html" class="btn btn-primary rounded-pill py-3 px-5 mt-3 fs-5">Enter Website</a>
            </div>
        </div>

        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="lib/wow/wow.min.js"></script>

        <script>
            new WOW().init();
        </script>

        <script>
            // Set the date we're counting down to (Sunday, May 10, 2026 at 12:00 PM)
            var countDownDate = new Date("May 10, 2026 12:00:00").getTime();

            var x = setInterval(function() {
                var now = new Date().getTime();
                var distance = countDownDate - now;

                var days = Math.floor(distance / (1000 * 60 * 60 * 24));
                var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                var seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
                document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
                document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
                document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;

                // When the countdown is over, hide the timer and show the button!
                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("countdown").classList.add("d-none");
                    document.getElementById("launch-message").classList.remove("d-none");
                }
            }, 1000);
        </script>
    </body>
</html>
